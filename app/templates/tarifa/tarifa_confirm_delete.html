{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagora - Excluir tarifa</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  {% include 'includes/_navbar.html' with nav_active='tarifas' %}

  <div class="contact-wrapper">
    <div class="contact-card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="card-tag">exclusão</div>
      <div class="card-title">Excluir tarifa</div>
      <p class="card-sub">
        Tem certeza que deseja excluir a tarifa <strong>{{ tarifa.descricao }}</strong> ({{ tarifa.hora_inicio|time:'H:i' }} - {{ tarifa.hora_fim|time:'H:i' }})?
      </p>

      <form method="post">
        {% csrf_token %}
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top: 12px;">
          <button type="submit" class="btn-submit">&#9654; confirmar exclusão</button>
          <a href="{% url 'tarifa_list' %}" class="btn-secondary">cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
